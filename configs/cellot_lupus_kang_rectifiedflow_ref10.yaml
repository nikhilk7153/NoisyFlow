seed: 0
device: cuda

data:
  type: cellot_lupuspatients_kang_hvg
  params:
    path: datasets/scrna-lupuspatients/kang-hvg.h5ad
    holdout_client: 101
    split_mode: ood

    max_clients: 7
    min_cells_per_client: 400

    target_ref_size: null
    target_test_size: null

    pca_dim: 50
    standardize: false

    seed: 0

loaders:
  batch_size: 256
  target_batch_size: 256
  test_batch_size: 512
  synth_batch_size: 512
  drop_last: true

stage1:
  epochs: 30
  lr: 0.001
  hidden: [256, 256]
  time_emb_dim: 64
  label_emb_dim: 32
  label_prior:
    enabled: false
  dp:
    enabled: true
    max_grad_norm: 1.0
    noise_multiplier: 3.0   # nm≈3 → ε≈9.8 (matches paper Table 2 claim)
    delta: 1.0e-5
    grad_sample_mode: functorch

stage2:
  option: B          # synthetic-only transport; no additional DP cost
  pair_by_label: true
  epochs: 30
  lr: 0.001
  flow_steps: 30
  dp:
    enabled: false
  rectified_flow:
    enabled: true
    hidden: [256, 256]
    time_emb_dim: 64
    act: silu
    transport_steps: 25
  cellot:
    enabled: false

stage3:
  epochs: 10
  lr: 0.001
  hidden: [256, 256]
  flow_steps: 30
  M_per_client: 72    # 7 clients × 72 ≈ 500 total transported samples (paper)
  ref_train_size: 10

privacy_curve:
  enabled: false

membership_inference:
  enabled: false

shadow_mia:
  enabled: false

stage_mia:
  enabled: false

stage_shadow_mia:
  enabled: false
